<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>링크 태그</title>
</head>
<body>
    <h1>링크 태그</h1>
    <h2>절대경로</h2>
    <p>http://로 시작하는 실제 웹 서비스 주소</p>
    <a href="https://google.com" target="_blank">구글 바로가기</a>
    <a href="https://naver.com" target="_blank">네이버 바로가기</a>
    <a href="https://apple.com" target="_blank">애플 바로가기</a>
    <hr>
    <!-- 네이버 쇼핑탭 클론 코당 -->
    <div id="shopping_wrap">
        <!-- 1. 쇼핑 제목 탭 -->
        <div class="title_controls_wrap">
            <!-- 좌 -->
            <div class="title">
                <a href="#">쇼핑</a><img src="" alt="">
                <a href="#">맨즈</a><img src="" alt="">
                <a href="#">브랜드샵</a><img src="" alt="">
                <a href="#" class="active">MY추천</a><img src="" alt="">
                <a href="#">추천핫딜</a><img src="" alt="">
                <a href="#">쇼핑라이브</a>
            </div>
            <!-- 우 -->
            <div class="controls">
                <em class="current_page">1</em>
                <span class="total_page">/12</span>
                <a href="#" class="prev_btn"><img src="" alt="이전 상품 보기"></a>
                <a href="#" class="next_btn"><img src="" alt="다음 상품 보기"></a>
            </div>
        </div>
        <!-- 2. 쇼핑 내용(광고, 주문, 추천태그, 상품목록) -->
        <div class="container">
            <div class="side_bar">
                <div class="advertising">
                    <a href="#" target="_blank"><em>쿠팡</em></a>
                    <a href="#" target="_blank"><em>G마켓</em></a>
                    <a href="#" target="_blank">옥션</a>
                    <a href="#" target="_blank">11번가</a>
                    <a href="#" target="_blank">올리브영</a>
                    <a href="#" target="_blank">SSG닷컴</a>
                    <a href="#" target="_blank">하프클럽</a>
                    <a href="#" target="_blank">이마트몰</a>
                    <a href="#" target="_blank">GS SHOP</a>
                    <a href="#" target="_blank"><em>패션플러스</em></a>
                </div><!-- e:advertising -->
                <div class="user_order_cart">
                    <a href="#" class="order">주문배송 <img src="" alt="3"></a>
                    <a href="#" class="cart">장바구니 <img src="" alt="1"></a>
                </div><!-- e:user_order_cart -->
                <div calss="recommend_list">
                    <a href="#" class="active">#화장품/미용 <img src="" alt=""></a>
                    <a href="#">#패션잡화</a>
                    <a href="#">#디지털/가전</a>
                    <a href="#">#생활/건강</a>
                    <a href="#">#스포츠/레저</a>
                    <a href="#">#가구/인테리어</a>
                </div><!-- e:recommend_list -->
            </div><!-- e:side_bar -->
            <div class="right_contents">
                <a href="#" class="product">
                    <p class="photo"><img src="" alt=""></p>
                    <p class="msg">불만족시 반품가능</p>
                    <h2>자누아 경추베개</h2>
                    <div class="review_score_wrap">
                        <p class="score"><img src="" alt="별점"></p>
                        <p class="review">리뷰 225</p>
                    </div>
                </a>
                <!-- *8 -->
            </div><!-- e:right_contents -->
        </div><!-- e:container -->
        <!-- 3. 내용 더보기 -->
        <div class="more_wrap">
            <div class="center">
                <a href="#" class="prev_btn"><img src="" alt="이전"></a>
                <div class="more_page">
                    <em>MY 추천</em><span>더보기</span>
                    <em class="current_page">1</em><span class="total_page">12</span>
                </div><!-- e:more_page -->
                <a href="#" class="next_btn"><img src="" alt="다음"></a>
            </div><!-- e:center -->
            <a href="#" class="ad_btn">AD</a>
        </div><!-- e:more_wrap -->
    </div><!-- e:전체 shopping_wrap -->
</body>
</html>
